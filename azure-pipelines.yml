# =============================================================================
# azure-pipelines.yml — OmniAPI pipeline (Azure DevOps)
# -----------------------------------------------------------------------------
# Two stages: a static Quality gate, then Test (publishing JUnit results and the
# HTML/summary artifacts). Same gate philosophy as the GitHub Actions workflow.
# =============================================================================
trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  CI: 'true'

stages:
  - stage: Quality
    displayName: Quality gate
    jobs:
      - job: static_checks
        displayName: Typecheck · Lint · Format
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '22.x'
            displayName: Use Node 22
          - script: npm ci
            displayName: Install dependencies
          - script: npm run typecheck
            displayName: Typecheck
          - script: npm run lint
            displayName: Lint
          - script: npm run format:check
            displayName: Format check

  - stage: Test
    displayName: Test
    dependsOn: Quality
    jobs:
      - job: run_tests
        displayName: Run Playwright API tests
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '22.x'
            displayName: Use Node 22
          - script: npm ci
            displayName: Install dependencies
          - script: npm run test:ci
            displayName: Run tests
          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: 'test-results/junit-results.xml'
              testRunTitle: OmniAPI
            displayName: Publish test results
          - task: PublishBuildArtifacts@1
            condition: always()
            inputs:
              PathtoPublish: playwright-report
              ArtifactName: playwright-report
            displayName: Publish HTML report
